<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>macOS-Inspired Clock</title>        
        <link rel="stylesheet" href="./style.css">
    </head>

    <body>
        <div id="svg-animation-bg-wrap">
            <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
                <defs> 
                    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="rgba(255, 0, 255, 1)"/>
                        <stop offset="100%" stop-color="rgba(255, 0, 255, 0)"/>
                    </radialGradient>

                    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="rgba(255, 255, 0, 1)"/>
                        <stop offset="100%" stop-color="rgba(255, 255, 0, 0)"/>
                    </radialGradient>

                    <radialGradient id="g3" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="rgba(0, 255, 255, 1)"/>
                        <stop offset="100%" stop-color="rgba(0, 255, 255, 0)"/>
                    </radialGradient>
                </defs>

                <rect width="100%" height="100%" fill="url(#g1)">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="12s" repeatCount="indefinite"/>
                    <animate attributeName="x" values="0%;20%;0%" dur="18s" repeatCount="indefinite"/>
                    <animate attributeName="y" values="0%;20%;0%" dur="20s" repeatCount="indefinite"/>
                </rect>

                <rect width="100%" height="100%" fill="url(#g2)">
                    <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="16s" repeatCount="indefinite"/>
                    <animate attributeName="x" values="0%;-25%;0%" dur="22s" repeatCount="indefinite"/>
                    <animate attributeName="y" values="0%;25%;0%" dur="24s" repeatCount="indefinite"/>
                </rect>

                <rect width="100%" height="100%" fill="url(#g3)">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite"/>
                    <animate attributeName="x" values="0%;15%;0%" dur="14s" repeatCount="indefinite"/>
                    <animate attributeName="y" values="0%;-15%;0%" dur="16s" repeatCount="indefinite"/>
                </rect>
            </svg>
        </div>

        <div class="clock-container">
            <div class="date" id="date"></div>

            <div class="clock">
                <span id="hours">00</span>
                <span class="colon">:</span>
                <span id="minutes">00</span>
                <span class="colon">:</span>
                <span id="seconds">00</span>
                <span id="meridiem"></span>
            </div>
            
            <div class="time-format">
                <button class="format-btn active" id="time-format-12">12-Hour</button>
                <button class="format-btn" id="time-format-24">24-Hour</button>
            </div>

            <div class="theme-toggle-container">
                <span class="theme-icon">&#9728</span>
                <input type="checkbox" id="theme-toggle-input">
                <label for="theme-toggle-input" class="theme-toggle"></label>
                <span class="theme-icon">&#9790</span>
            </div>
        </div>

        <script src="./script.js"></script>
    </body>
</html>
